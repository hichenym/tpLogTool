name: Build and Release (Nuitka)

on:
  push:
    tags:
      - 'v*'  # 当推送 v3.0.0, v3.0.1 等标签时触发

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt --no-cache-dir
          pip install nuitka ordered-set zstandard
      
      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref }}"
          $fullVersion = $tag -replace 'refs/tags/v', ''
          # 提取纯数字版本号（去掉 -debug, -rc1 等后缀）
          $version = ($fullVersion -split '-')[0]
          # 保留后缀标识（debug, rc1 等）
          $suffix = ''
          if ($fullVersion -match '-(.+)$') { $suffix = $Matches[1] }
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "full_version=$fullVersion" >> $env:GITHUB_OUTPUT
          echo "suffix=$suffix" >> $env:GITHUB_OUTPUT
          echo "tag=$($tag -replace 'refs/tags/', '')" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $version, Suffix: $suffix, Full: $fullVersion"
      
      - name: Update version.py
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $parts = $version -split '\.'
          $major = $parts[0] -replace '[^0-9]', ''
          $minor = $parts[1] -replace '[^0-9]', ''
          $patch = $parts[2] -replace '[^0-9]', ''
          $buildDate = Get-Date -Format "yyyyMMdd"
          
          $content = Get-Content "query_tool/version.py" -Raw -Encoding UTF8
          $content = $content -replace 'VERSION_MAJOR = \d+', "VERSION_MAJOR = $major"
          $content = $content -replace 'VERSION_MINOR = \d+', "VERSION_MINOR = $minor"
          $content = $content -replace 'VERSION_PATCH = \d+', "VERSION_PATCH = $patch"
          $content = $content -replace 'BUILD_DATE = "\d+"', "BUILD_DATE = `"$buildDate`""
          $content | Set-Content "query_tool/version.py" -Encoding UTF8 -NoNewline
          
          Write-Host "Updated version.py to V$version ($buildDate)"
      
      - name: Inject secrets
        shell: pwsh
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        run: |
          $pyScript = @'
          import os
          f = "query_tool/utils/data_sync.py"
          c = open(f, "r", encoding="utf-8").read()
          ak = os.environ.get("FEISHU_APP_ID", "")
          sk = os.environ.get("FEISHU_APP_SECRET", "")
          c = c.replace("_AK = \"\"", f"_AK = \"{ak}\"")
          c = c.replace("_SK = \"\"", f"_SK = \"{sk}\"")
          open(f, "w", encoding="utf-8").write(c)
          print(f"Secrets injected: AK={bool(ak)}, SK={bool(sk)}")
          '@
          $pyScript | python -

      - name: Build with Nuitka
        shell: pwsh
        run: |
          Write-Host "开始 Nuitka 编译..."
          Write-Host "Python: $(python --version)"
          Write-Host "Nuitka: $(python -m nuitka --version)"
          
          python -m nuitka `
            --standalone `
            --onefile `
            --output-dir=dist `
            --output-filename=TPQueryTool.exe `
            --windows-icon-from-ico=./resources/icons/app/logo.ico `
            --windows-console-mode=disable `
            --windows-company-name=TPQueryTool `
            --windows-product-name=TPQueryTool `
            --windows-file-description="TP Query Tool" `
            --windows-product-version="${{ steps.version.outputs.version }}.0" `
            --windows-file-version="${{ steps.version.outputs.version }}.0" `
            --assume-yes-for-downloads `
            --jobs=4 `
            --enable-plugin=pyqt5 `
            --include-module=ddddocr `
            --include-module=onnxruntime `
            --include-module=cv2 `
            --include-module=numpy `
            --include-module=lark_oapi `
            --include-module=lark_oapi.api.bitable.v1 `
            --include-module=json `
            --include-module=requests `
            --include-module=bs4 `
            --include-module=coloredlogs `
            --include-module=PIL `
            --include-package=query_tool `
            --include-package=query_tool.pages `
            --include-package=query_tool.utils `
            --include-package=query_tool.widgets `
            --include-package=resources `
            --include-package-data=ddddocr `
            --include-package-data=onnxruntime `
            --include-data-dir=resources/icons=resources/icons `
            --nofollow-import-to="lark_oapi.api.acs.*" `
            --nofollow-import-to="lark_oapi.api.admin.*" `
            --nofollow-import-to="lark_oapi.api.application.*" `
            --nofollow-import-to="lark_oapi.api.approval.*" `
            --nofollow-import-to="lark_oapi.api.attendance.*" `
            --nofollow-import-to="lark_oapi.api.authen.*" `
            --nofollow-import-to="lark_oapi.api.baike.*" `
            --nofollow-import-to="lark_oapi.api.calendar.*" `
            --nofollow-import-to="lark_oapi.api.contact.*" `
            --nofollow-import-to="lark_oapi.api.corehr.*" `
            --nofollow-import-to="lark_oapi.api.docx.*" `
            --nofollow-import-to="lark_oapi.api.drive.*" `
            --nofollow-import-to="lark_oapi.api.ehr.*" `
            --nofollow-import-to="lark_oapi.api.event.*" `
            --nofollow-import-to="lark_oapi.api.hire.*" `
            --nofollow-import-to="lark_oapi.api.human_authentication.*" `
            --nofollow-import-to="lark_oapi.api.im.*" `
            --nofollow-import-to="lark_oapi.api.lingo.*" `
            --nofollow-import-to="lark_oapi.api.mail.*" `
            --nofollow-import-to="lark_oapi.api.meeting_room.*" `
            --nofollow-import-to="lark_oapi.api.okr.*" `
            --nofollow-import-to="lark_oapi.api.optical_char_recognition.*" `
            --nofollow-import-to="lark_oapi.api.passport.*" `
            --nofollow-import-to="lark_oapi.api.performance.*" `
            --nofollow-import-to="lark_oapi.api.personal_settings.*" `
            --nofollow-import-to="lark_oapi.api.report.*" `
            --nofollow-import-to="lark_oapi.api.search.*" `
            --nofollow-import-to="lark_oapi.api.sheets.*" `
            --nofollow-import-to="lark_oapi.api.speech_to_text.*" `
            --nofollow-import-to="lark_oapi.api.task.*" `
            --nofollow-import-to="lark_oapi.api.tenant.*" `
            --nofollow-import-to="lark_oapi.api.translation.*" `
            --nofollow-import-to="lark_oapi.api.vc.*" `
            --nofollow-import-to="lark_oapi.api.verification.*" `
            --nofollow-import-to="lark_oapi.api.wiki.*" `
            run.py
          
          Write-Host "`n检查生成的文件..."
          Get-ChildItem dist
          
          if (Test-Path "dist/TPQueryTool.exe") {
              $file = Get-Item "dist/TPQueryTool.exe"
              Write-Host "`n✓ Nuitka 打包成功: TPQueryTool.exe"
              Write-Host "文件大小: $([math]::Round($file.Length / 1MB, 2)) MB"
          } else {
              Write-Host "`n✗ 错误: 找不到 TPQueryTool.exe"
              Get-ChildItem dist -Recurse
              exit 1
          }
      
      - name: Get file size
        id: filesize
        shell: pwsh
        run: |
          $file = "dist/TPQueryTool.exe"
          $sizeBytes = (Get-Item $file).Length
          $sizeMB = [math]::Round($sizeBytes / 1MB, 2)
          echo "size_mb=$sizeMB" >> $env:GITHUB_OUTPUT
          Write-Host "File size: $sizeMB MB"
      
      - name: Calculate file hash
        id: filehash
        shell: pwsh
        run: |
          $file = "dist/TPQueryTool.exe"
          $hash = Get-FileHash -Path $file -Algorithm SHA256
          $sha256 = $hash.Hash.ToLower()
          echo "sha256=$sha256" >> $env:GITHUB_OUTPUT
          Write-Host "SHA256: $sha256"
          "$sha256  TPQueryTool.exe" | Set-Content "dist/TPQueryTool.exe.sha256" -Encoding ASCII
      
      - name: Extract changelog from version.py
        id: changelog
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          
          python -c @"
          import re, sys
          version = '$version'
          with open('query_tool/version.py', 'r', encoding='utf-8') as f:
              content = f.read()
          match = re.search(r'VERSION_HISTORY = \"\"\"(.*?)\"\"\"', content, re.DOTALL)
          if not match:
              print('ERROR: Could not find VERSION_HISTORY', file=sys.stderr)
              sys.exit(1)
          history = match.group(1)
          version_pattern = rf'[Vv]{re.escape(version)}\s*\([^)]+\)(.*?)(?=[Vv]\d+\.\d+\.\d+|\Z)'
          version_match = re.search(version_pattern, history, re.DOTALL)
          if version_match:
              changelog = version_match.group(1).strip()
          else:
              changelog = f'V{version} 版本更新'
          with open('CHANGELOG.txt', 'w', encoding='utf-8') as f:
              f.write(changelog)
          print('Changelog extracted successfully')
          "@
          
          if (Test-Path "CHANGELOG.txt") {
              echo "changelog_found=true" >> $env:GITHUB_OUTPUT
          } else {
              echo "changelog_found=false" >> $env:GITHUB_OUTPUT
          }
      
      - name: Generate version.json
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $buildDate = Get-Date -Format "yyyyMMdd"
          $fileSize = "${{ steps.filesize.outputs.size_mb }}"
          $fileSizeBytes = (Get-Item "dist/TPQueryTool.exe").Length
          $sha256 = "${{ steps.filehash.outputs.sha256 }}"
          $tag = "${{ steps.version.outputs.tag }}"
          $repo = "${{ github.repository }}"
          
          $changelogItems = @()
          if (Test-Path "CHANGELOG.txt") {
              $changelog = Get-Content "CHANGELOG.txt" -Encoding UTF8
              $changelogItems = $changelog | Where-Object { $_ -match '^\s*[-*]' } | ForEach-Object {
                  $_ -replace '^\s*[-*]\s*', ''
              } | Select-Object -First 10
          }
          if ($changelogItems.Count -eq 0) {
              $changelogItems = @("请查看 Release 页面获取完整更新日志")
          }
          $changelogJson = $changelogItems | ConvertTo-Json -Compress
          
          $analyticsJson = '{}'
          if (Test-Path "version.json") {
              $existing = Get-Content "version.json" -Raw -Encoding UTF8 | ConvertFrom-Json
              if ($existing.analytics) {
                  $analyticsJson = $existing.analytics | ConvertTo-Json -Compress
              }
          }
          
          $versionJson = @"
          {
            "version": "$version",
            "build_date": "$buildDate",
            "download_url": "https://github.com/$repo/releases/download/$tag/TPQueryTool.exe",
            "file_size_mb": $fileSize,
            "file_size_bytes": $fileSizeBytes,
            "file_hash": "$sha256",
            "hash_algorithm": "sha256",
            "checksum_url": "https://github.com/$repo/releases/download/$tag/TPQueryTool.exe.sha256",
            "release_notes_url": "https://github.com/$repo/releases/tag/$tag",
            "min_version": "3.0.0",
            "update_strategy": "silent",
            "changelog": $changelogJson,
            "analytics": $analyticsJson
          }
          "@
          
          $versionJson | Set-Content "version.json" -Encoding UTF8
          Write-Host "Generated version.json"
      
      - name: Generate Release Notes
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $buildDate = Get-Date -Format "yyyy-MM-dd"
          $fileSize = "${{ steps.filesize.outputs.size_mb }}"
          $tag = "${{ steps.version.outputs.tag }}"
          $repo = "${{ github.repository }}"
          
          $releaseNotes = @"
          ## 🎉 查询工具 V$version
          
          **编译日期**: $buildDate
          **文件大小**: $fileSize MB
          **SHA256**: ``${{ steps.filehash.outputs.sha256 }}``
          **编译方式**: Nuitka (原生编译)
          
          ### 📦 下载
          
          - [**下载 TPQueryTool.exe**](https://github.com/$repo/releases/download/$tag/TPQueryTool.exe)
          - [TPQueryTool.exe.sha256](https://github.com/$repo/releases/download/$tag/TPQueryTool.exe.sha256)
          - [version.json](https://github.com/$repo/releases/download/$tag/version.json)
          
          ### 🔒 文件校验
          
          ````powershell
          `$hash = (Get-FileHash -Algorithm SHA256 TPQueryTool.exe).Hash.ToLower()
          if (`$hash -eq "${{ steps.filehash.outputs.sha256 }}") { Write-Host "✓ 校验通过" } else { Write-Host "✗ 校验失败" }
          ````
          
          ### 📝 更新说明
          
          "@
          
          if (Test-Path "CHANGELOG.txt") {
              $changelog = Get-Content "CHANGELOG.txt" -Raw -Encoding UTF8
              $releaseNotes += $changelog
          }
          
          $releaseNotes += @"
          
          
          ### 🚀 使用方法
          
          1. 下载 ``TPQueryTool.exe``
          2. 直接运行（无需安装）
          3. 首次运行请配置账号信息
          
          ---
          *此版本由 GitHub Actions + Nuitka 自动构建*
          "@
          
          $releaseNotes | Set-Content "RELEASE_NOTES.md" -Encoding UTF8
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/TPQueryTool.exe
            dist/TPQueryTool.exe.sha256
            version.json
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ steps.version.outputs.suffix != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Commit version.json to repository
        shell: bash
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git fetch origin main
          git checkout main
          git pull origin main
          cp version.json version.json.new
          git checkout HEAD -- version.json 2>/dev/null || true
          cp version.json.new version.json
          git add version.json
          git commit -m "chore: update version.json for ${{ steps.version.outputs.tag }}" || echo "No changes to commit"
          git push origin main
